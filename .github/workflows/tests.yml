name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - run: python -m ruff check .
      - run: python -m unittest discover -s tests -v
      - run: python -m py_compile adguard_dns_observer/observer.py
      - name: Check app version bump for pull request
        if: github.event_name == 'pull_request'
        run: python scripts/check_version_bump.py --base-ref "origin/${{ github.base_ref }}"
      - name: Check app version bump for direct push
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: python scripts/check_version_bump.py --base-ref "${{ github.event.before }}"
